# Frigate NVR — runs on the mothership PC.
# Start with: docker compose up -d
# Web UI: http://localhost:5000
#
# Windows notes:
#   - /etc/localtime replaced with TZ env var
#   - /mnt/nvr replaced with a local ./storage dir (adjust to a larger drive if needed)

services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: unless-stopped
    privileged: true          # needed for hardware acceleration
    shm_size: 256mb           # shared memory for 2x 1080p cameras

    ports:
      - "5000:5000"           # web UI
      - "8971:8971"           # API

    volumes:
      - ./frigate/config.yml:/config/config.yml:ro
      - ./storage:/media/frigate    # recordings + snapshots (move to a bigger drive later)

    environment:
      - FRIGATE_RTSP_PASSWORD=unused   # we don't use auth on local RTSP streams
      - TZ=America/New_York           # adjust to your timezone
